[theme]
base = "dark"

# Accent: GitHub inspired blue, high contrast against dark surfaces
primaryColor = "#58A6FF"

# Backgrounds: deep navy-black, easy on the eyes
backgroundColor = "#0D1117"
secondaryBackgroundColor = "#161B22"
codeBackgroundColor = "#151B23"

# Text: warm off-white, safe contrast ratio
textColor = "#E6EDF3"
linkColor = "#58A6FF"

# Borders: subtle separation without visual noise
borderColor = "#30363D"
showWidgetBorder = true
showSidebarBorder = true

# Corners: subtle rounding, modern feel
baseRadius = "0.5rem"

# Fonts: Inter for body/headings, JetBrains Mono for code
font = "Inter, sans-serif"
headingFont = "Inter, sans-serif"
codeFont = "'JetBrains Mono', monospace"

# Sidebar theme
[theme.sidebar]
backgroundColor = "#0D1117"
secondaryBackgroundColor = "#161B22"
primaryColor = "#58A6FF"
textColor = "#E6EDF3"
borderColor = "#30363D"
